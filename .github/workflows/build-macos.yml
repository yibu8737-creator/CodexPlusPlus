name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: Apple Silicon (M1/M2/M3/M4)
          - target: x86_64-apple-darwin
            arch: Intel Mac

    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package app bundle
        run: |
          mkdir -p dist/macos
          if [ -f "target/${{ matrix.target }}/release/codex-plus-plus" ]; then
            cp "target/${{ matrix.target }}/release/codex-plus-plus" "dist/macos/"
          fi
          if [ -f "target/${{ matrix.target }}/release/codex-plus-plus-manager" ]; then
            cp "target/${{ matrix.target }}/release/codex-plus-plus-manager" "dist/macos/"
          fi
          if [ -f "target/${{ matrix.target }}/release/codex-plus-plus.app" ]; then
            cp -r "target/${{ matrix.target }}/release/codex-plus-plus.app" "dist/macos/"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-binaries
          path: dist/macos/
          retention-days: 7

  create-release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-build
          name: macOS Build
          draft: true
          files: |
            artifacts/**/*
