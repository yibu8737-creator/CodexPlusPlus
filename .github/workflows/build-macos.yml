name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: AppleSilicon
          - target: x86_64-apple-darwin
            arch: IntelMac

    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install manager frontend
        working-directory: apps/codex-plus-plus-manager
        run: npm install --package-lock=false

      - name: Build manager frontend
        working-directory: apps/codex-plus-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package app bundle
        run: |
          mkdir -p dist/macos/codex-plus-plus.app/Contents/MacOS
          mkdir -p dist/macos/codex-plus-plus.app/Contents/Resources

          cp target/${{ matrix.target }}/release/codex-plus-plus \
            dist/macos/codex-plus-plus.app/Contents/MacOS/

          cp target/${{ matrix.target }}/release/codex-plus-plus-manager \
            dist/macos/codex-plus-plus.app/Contents/MacOS/

          chmod +x dist/macos/codex-plus-plus.app/Contents/MacOS/*

          cat > dist/macos/codex-plus-plus.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>codex-plus-plus-manager</string>

            <key>CFBundleIdentifier</key>
            <string>com.codexplusplus.manager</string>

            <key>CFBundleName</key>
            <string>Codex++</string>

            <key>CFBundleDisplayName</key>
            <string>Codex++</string>

            <key>CFBundlePackageType</key>
            <string>APPL</string>

            <key>CFBundleVersion</key>
            <string>1.1.7</string>

            <key>CFBundleShortVersionString</key>
            <string>1.1.7</string>

            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-binaries
          path: dist/macos/
          retention-days: 7

  create-release:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: macos-build-${{ github.run_number }}
          name: macOS Build
          draft: true
          files: artifacts/**/*
